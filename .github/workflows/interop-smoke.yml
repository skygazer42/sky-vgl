name: interop-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  pyg-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,pyg]"
      - name: PyG round-trip smoke
        run: python scripts/interop_smoke.py --backend pyg

  dgl-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,dgl]"
      - name: DGL round-trip smoke
        run: python scripts/interop_smoke.py --backend dgl
