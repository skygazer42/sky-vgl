name: publish

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  probe-publish-auth:
    runs-on: ubuntu-latest
    outputs:
      has_pypi_api_token: ${{ steps.detect.outputs.has_pypi_api_token }}
      has_test_pypi_api_token: ${{ steps.detect.outputs.has_test_pypi_api_token }}
    steps:
      - id: detect
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "has_pypi_api_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pypi_api_token=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$TEST_PYPI_API_TOKEN" ]; then
            echo "has_test_pypi_api_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_test_pypi_api_token=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Validate release metadata consistency
        run: python scripts/metadata_consistency.py --git-ref "${GITHUB_REF}"
      - name: Build artifacts
        run: python -m build
      - name: Scan built artifact contracts
        run: python scripts/release_contract_scan.py --artifact-dir dist
      - name: Validate package metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz
      - name: Smoke-test built distributions
        run: python scripts/release_smoke.py --artifact-dir dist --kind all
      - name: Install release interop extras
        run: python scripts/install_release_extras.py --artifact-dir dist --extras pyg dgl
      - name: Smoke-test built distributions with all interop backends
        run: python scripts/release_smoke.py --artifact-dir dist --kind all --interop-backend all
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/*

  publish-testpypi-token:
    if: github.event_name == 'workflow_dispatch' && needs.probe-publish-auth.outputs.has_test_pypi_api_token == 'true'
    needs: [probe-publish-auth, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: testpypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist
      - name: Publish to TestPyPI with API token
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  publish-testpypi-trusted:
    if: github.event_name == 'workflow_dispatch' && needs.probe-publish-auth.outputs.has_test_pypi_api_token != 'true'
    needs: [probe-publish-auth, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist
      - name: Publish to TestPyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi-token:
    if: (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')) && needs.probe-publish-auth.outputs.has_pypi_api_token == 'true'
    needs: [probe-publish-auth, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist
      - name: Publish to PyPI with API token
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-pypi-trusted:
    if: (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')) && needs.probe-publish-auth.outputs.has_pypi_api_token != 'true'
    needs: [probe-publish-auth, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist
      - name: Publish to PyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
