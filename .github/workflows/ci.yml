name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run full repository scan
        run: python scripts/full_scan.py
      - name: Run docs link scan
        run: python scripts/docs_link_scan.py
      - name: Run public surface scan
        run: python scripts/public_surface_scan.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run Ruff
        run: python -m ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install typecheck dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run mypy
        run: python -m mypy vgl

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Build docs
        run: python -m mkdocs build --strict

  exec-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install execution scan dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,networkx,scipy,tensorboard]"
      - name: Run extras smoke scan
        run: python scripts/extras_smoke.py --extras networkx scipy tensorboard
      - name: Run dependency audit
        run: python scripts/dependency_audit.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,networkx,scipy,tensorboard]"
      - name: Run tests
        run: python -m pytest -q

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Build artifacts
        run: python -m build
      - name: Scan built artifact contracts
        run: python scripts/release_contract_scan.py --artifact-dir dist
      - name: Validate package metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz
      - name: Smoke-test built distributions
        run: python scripts/release_smoke.py --artifact-dir dist --kind all
