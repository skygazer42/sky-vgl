<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Graph Icon -->
  <g transform="translate(20, 15)" filter="url(#shadow)">
    <!-- Edges -->
    <line x1="45" y1="20" x2="20" y2="60" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="45" y1="20" x2="70" y2="55" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="60" x2="50" y2="85" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="70" y1="55" x2="50" y2="85" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="60" x2="70" y2="55" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Nodes -->
    <circle cx="45" cy="20" r="9" fill="url(#grad1)"/>
    <circle cx="20" cy="60" r="8" fill="url(#grad2)"/>
    <circle cx="70" cy="55" r="8" fill="url(#grad2)"/>
    <circle cx="50" cy="85" r="7" fill="#c4b5fd"/>

    <!-- Message passing arrows (small) -->
    <path d="M38 32 L28 48" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arrowY)"/>
    <path d="M52 32 L62 45" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arrowY)"/>
  </g>

  <defs>
    <marker id="arrowY" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- VGL Text -->
  <text x="130" y="78" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="62" font-weight="800" letter-spacing="-2" fill="url(#grad1)">VGL</text>

  <!-- Tagline -->
  <text x="132" y="105" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="500" fill="#64748b" letter-spacing="0.5">Versatile Graph Learning</text>
</svg>
