<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="cl-head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <rect x="20" y="16" width="760" height="44" rx="10" fill="url(#cl-head)"/>
  <text x="36"  y="42" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="1">60+ CONVOLUTION LAYERS</text>
  <text x="360" y="42" font-size="11" fill="#ffffff" opacity="0.9">spectral · spatial · attention · hetero · temporal</text>

  <!-- Spectral -->
  <text x="28" y="92" font-size="12" font-weight="700" fill="#4c1d95">Spectral</text>
  <g font-size="10.5" fill="#374151">
    <rect x="120" y="76" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="155" y="91" text-anchor="middle">GCN</text>
    <rect x="200" y="76" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="235" y="91" text-anchor="middle">ChebConv</text>
    <rect x="280" y="76" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="315" y="91" text-anchor="middle">ARMA</text>
    <rect x="360" y="76" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="395" y="91" text-anchor="middle">APPNP</text>
    <rect x="440" y="76" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="475" y="91" text-anchor="middle">GPRGNN</text>
    <rect x="520" y="76" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="555" y="91" text-anchor="middle">BernConv</text>
    <rect x="600" y="76" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="635" y="91" text-anchor="middle">FAGCN</text>
    <rect x="680" y="76" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="715" y="91" text-anchor="middle">DAGNN</text>
  </g>

  <!-- Spatial -->
  <text x="28" y="124" font-size="12" font-weight="700" fill="#4c1d95">Spatial</text>
  <g font-size="10.5" fill="#374151">
    <rect x="120" y="108" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="155" y="123" text-anchor="middle">SAGE</text>
    <rect x="200" y="108" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="235" y="123" text-anchor="middle">GIN</text>
    <rect x="280" y="108" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="315" y="123" text-anchor="middle">GINE</text>
    <rect x="360" y="108" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="395" y="123" text-anchor="middle">EdgeConv</text>
    <rect x="440" y="108" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="475" y="123" text-anchor="middle">GraphConv</text>
    <rect x="520" y="108" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="555" y="123" text-anchor="middle">GatedGCN</text>
    <rect x="600" y="108" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="635" y="123" text-anchor="middle">DirGNN</text>
    <rect x="680" y="108" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="715" y="123" text-anchor="middle">PNA</text>
  </g>

  <!-- Attention -->
  <text x="28" y="156" font-size="12" font-weight="700" fill="#4c1d95">Attention</text>
  <g font-size="10.5" fill="#374151">
    <rect x="120" y="140" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="155" y="155" text-anchor="middle">GAT</text>
    <rect x="200" y="140" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="235" y="155" text-anchor="middle">GATv2</text>
    <rect x="280" y="140" width="110" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="335" y="155" text-anchor="middle">TransformerConv</text>
    <rect x="400" y="140" width="80" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="440" y="155" text-anchor="middle">Graphormer</text>
    <rect x="490" y="140" width="50" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="515" y="155" text-anchor="middle">GPS</text>
    <rect x="550" y="140" width="80" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="590" y="155" text-anchor="middle">SGFormer</text>
    <rect x="640" y="140" width="100" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="690" y="155" text-anchor="middle">NAGphormer</text>
  </g>

  <!-- Hetero + Temporal -->
  <text x="28" y="188" font-size="12" font-weight="700" fill="#4c1d95">Hetero</text>
  <g font-size="10.5" fill="#374151">
    <rect x="120" y="172" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="155" y="187" text-anchor="middle">RGCN</text>
    <rect x="200" y="172" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="235" y="187" text-anchor="middle">HGT</text>
    <rect x="280" y="172" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="315" y="187" text-anchor="middle">HAN</text>
    <rect x="360" y="172" width="80" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="400" y="187" text-anchor="middle">HEATConv</text>
    <rect x="450" y="172" width="70" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="485" y="187" text-anchor="middle">HGConv</text>
  </g>
  <text x="560" y="188" font-size="12" font-weight="700" fill="#4c1d95">Temporal</text>
  <g font-size="10.5" fill="#374151">
    <rect x="640" y="172" width="50" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="665" y="187" text-anchor="middle">TGN</text>
    <rect x="700" y="172" width="50" height="22" rx="11" fill="#f5f3ff" stroke="#e9d5ff"/><text x="725" y="187" text-anchor="middle">TGAT</text>
  </g>

  <text x="400" y="212" text-anchor="middle" font-size="10.5" fill="#6b7280">…and more on a unified MessagePassing base</text>
</svg>
