<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <filter id="gtShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="#fafafa"/>

  <!-- === Homogeneous Graph === -->
  <g filter="url(#gtShadow)">
    <rect x="20" y="15" width="240" height="170" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="140" y="42" font-family="'Inter',sans-serif" font-size="13" font-weight="700" fill="#6366f1" text-anchor="middle">Homogeneous</text>
    <text x="140" y="58" font-family="'Inter',sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Graph.homo()</text>

    <!-- Graph -->
    <g transform="translate(80, 65)">
      <line x1="20" y1="15" x2="80" y2="15" stroke="#a78bfa" stroke-width="2"/>
      <line x1="20" y1="15" x2="50" y2="65" stroke="#a78bfa" stroke-width="2"/>
      <line x1="80" y1="15" x2="50" y2="65" stroke="#a78bfa" stroke-width="2"/>
      <line x1="80" y1="15" x2="120" y2="50" stroke="#a78bfa" stroke-width="2"/>
      <line x1="50" y1="65" x2="120" y2="50" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
      <circle cx="20" cy="15" r="10" fill="#6366f1"/>
      <circle cx="80" cy="15" r="10" fill="#6366f1"/>
      <circle cx="50" cy="65" r="10" fill="#6366f1"/>
      <circle cx="120" cy="50" r="10" fill="#6366f1"/>
    </g>

    <text x="140" y="170" font-family="'Inter',sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Single node &amp; edge type</text>
  </g>

  <!-- === Heterogeneous Graph === -->
  <g filter="url(#gtShadow)">
    <rect x="280" y="15" width="240" height="170" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="400" y="42" font-family="'Inter',sans-serif" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">Heterogeneous</text>
    <text x="400" y="58" font-family="'Inter',sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Graph.hetero()</text>

    <!-- Graph -->
    <g transform="translate(340, 65)">
      <line x1="15" y1="20" x2="60" y2="10" stroke="#93c5fd" stroke-width="2" stroke-dasharray="5 3"/>
      <line x1="15" y1="20" x2="55" y2="65" stroke="#93c5fd" stroke-width="2"/>
      <line x1="60" y1="10" x2="110" y2="30" stroke="#fdba74" stroke-width="2"/>
      <line x1="55" y1="65" x2="110" y2="30" stroke="#fdba74" stroke-width="2" stroke-dasharray="5 3"/>
      <!-- Different shaped nodes -->
      <circle cx="15" cy="20" r="10" fill="#3b82f6"/>
      <rect x="50" y="0" width="20" height="20" rx="3" fill="#f59e0b"/>
      <circle cx="55" cy="65" r="10" fill="#3b82f6"/>
      <polygon points="110,20 120,40 100,40" fill="#10b981"/>
    </g>

    <text x="400" y="170" font-family="'Inter',sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Multiple node &amp; edge types</text>
  </g>

  <!-- === Temporal Graph === -->
  <g filter="url(#gtShadow)">
    <rect x="540" y="15" width="240" height="170" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="660" y="42" font-family="'Inter',sans-serif" font-size="13" font-weight="700" fill="#10b981" text-anchor="middle">Temporal</text>
    <text x="660" y="58" font-family="'Inter',sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Graph.temporal()</text>

    <!-- Timeline -->
    <g transform="translate(580, 70)">
      <!-- Time arrow -->
      <line x1="0" y1="75" x2="155" y2="75" stroke="#d1d5db" stroke-width="1.5"/>
      <polygon points="152,71 160,75 152,79" fill="#d1d5db"/>
      <text x="80" y="90" font-family="'Inter',sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">time Æ</text>

      <!-- t=0 -->
      <line x1="20" y1="10" x2="50" y2="30" stroke="#6ee7b7" stroke-width="2"/>
      <line x1="20" y1="10" x2="20" y2="50" stroke="#6ee7b7" stroke-width="2"/>
      <circle cx="20" cy="10" r="7" fill="#10b981"/>
      <circle cx="50" cy="30" r="7" fill="#10b981"/>
      <circle cx="20" cy="50" r="7" fill="#10b981"/>
      <text x="30" y="70" font-family="'Inter',sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">tĆ</text>

      <!-- t=1 -->
      <line x1="90" y1="15" x2="120" y2="10" stroke="#6ee7b7" stroke-width="2"/>
      <line x1="90" y1="15" x2="105" y2="50" stroke="#6ee7b7" stroke-width="2"/>
      <line x1="120" y1="10" x2="105" y2="50" stroke="#6ee7b7" stroke-width="2" opacity="0.5"/>
      <circle cx="90" cy="15" r="7" fill="#10b981"/>
      <circle cx="120" cy="10" r="7" fill="#10b981"/>
      <circle cx="105" cy="50" r="7" fill="#10b981"/>
      <text x="105" y="70" font-family="'Inter',sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">tü</text>

      <!-- Dashed connection between snapshots -->
      <line x1="50" y1="30" x2="90" y2="15" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
    </g>

    <text x="660" y="170" font-family="'Inter',sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Time-evolving graphs &amp; snapshots</text>
  </g>
</svg>
