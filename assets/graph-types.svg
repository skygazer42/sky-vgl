<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="gt-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
  </defs>

  <!-- Homogeneous -->
  <rect x="20" y="20" width="240" height="160" rx="14" fill="url(#gt-card)" stroke="#e5e7eb"/>
  <text x="40" y="46" font-size="16" font-weight="700" fill="#4c1d95">同构图 Homogeneous</text>
  <text x="40" y="64" font-size="12" fill="#6b7280">单节点类型 · 单关系</text>
  <g stroke="#8b5cf6" stroke-width="2" fill="none">
    <line x1="80" y1="130" x2="140" y2="100"/>
    <line x1="140" y1="100" x2="200" y2="130"/>
    <line x1="80" y1="130" x2="200" y2="130"/>
    <line x1="140" y1="100" x2="140" y2="160"/>
    <line x1="80" y1="130" x2="140" y2="160"/>
    <line x1="200" y1="130" x2="140" y2="160"/>
  </g>
  <circle cx="80"  cy="130" r="8" fill="#6366f1"/>
  <circle cx="140" cy="100" r="8" fill="#6366f1"/>
  <circle cx="200" cy="130" r="8" fill="#6366f1"/>
  <circle cx="140" cy="160" r="8" fill="#6366f1"/>

  <!-- Heterogeneous -->
  <rect x="280" y="20" width="240" height="160" rx="14" fill="url(#gt-card)" stroke="#e5e7eb"/>
  <text x="300" y="46" font-size="16" font-weight="700" fill="#4c1d95">异构图 Heterogeneous</text>
  <text x="300" y="64" font-size="12" fill="#6b7280">多节点类型 · 多关系</text>
  <line x1="330" y1="120" x2="400" y2="95"  stroke="#8b5cf6" stroke-width="2"/>
  <line x1="400" y1="95"  x2="470" y2="120" stroke="#22c55e" stroke-width="2"/>
  <line x1="330" y1="120" x2="400" y2="155" stroke="#f59e0b" stroke-width="2"/>
  <line x1="470" y1="120" x2="400" y2="155" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="330" cy="120" r="9" fill="#6366f1"/>
  <circle cx="400" cy="95"  r="9" fill="#10b981"/>
  <circle cx="470" cy="120" r="9" fill="#f59e0b"/>
  <circle cx="400" cy="155" r="9" fill="#6366f1"/>
  <text x="300" y="176" font-size="12" fill="#6b7280">author · paper · venue</text>

  <!-- Temporal -->
  <rect x="540" y="20" width="240" height="160" rx="14" fill="url(#gt-card)" stroke="#e5e7eb"/>
  <text x="560" y="46" font-size="16" font-weight="700" fill="#4c1d95">时序图 Temporal</text>
  <text x="560" y="64" font-size="12" fill="#6b7280">带时间戳的事件流</text>
  <line x1="570" y1="135" x2="760" y2="135" stroke="#d1d5db" stroke-width="1.5"/>
  <circle cx="590" cy="135" r="7" fill="#6366f1"/>
  <circle cx="630" cy="135" r="7" fill="#10b981"/>
  <circle cx="670" cy="135" r="7" fill="#6366f1"/>
  <circle cx="710" cy="135" r="7" fill="#f59e0b"/>
  <circle cx="750" cy="135" r="7" fill="#10b981"/>
  <g font-size="11" fill="#6b7280" text-anchor="middle">
    <text x="590" y="156">t1</text>
    <text x="630" y="156">t2</text>
    <text x="670" y="156">t3</text>
    <text x="710" y="156">t4</text>
    <text x="750" y="156">t5</text>
  </g>
  <g stroke="#8b5cf6" stroke-width="2" fill="none">
    <path d="M590 135 Q 610 110 630 135"/>
    <path d="M630 135 Q 650 110 670 135"/>
    <path d="M670 135 Q 690 110 710 135"/>
    <path d="M710 135 Q 730 110 750 135"/>
  </g>
</svg>
