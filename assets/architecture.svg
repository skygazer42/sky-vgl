<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="ag-user" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="ag-data" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="ag-core" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="ag-infra" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect x="40" y="30" width="720" height="60" rx="10" fill="url(#ag-user)"/>
  <text x="60" y="52" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="1">用户接口层 USER API</text>
  <g font-size="13" font-weight="700" fill="#ffffff">
    <text x="190" y="72">vgl.engine</text>
    <text x="330" y="72">vgl.tasks</text>
    <text x="460" y="72">vgl.metrics</text>
    <text x="600" y="72">vgl.transforms</text>
  </g>

  <rect x="40" y="110" width="720" height="60" rx="10" fill="url(#ag-data)"/>
  <text x="60" y="132" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="1">数据层 DATA</text>
  <g font-size="13" font-weight="700" fill="#ffffff">
    <text x="160" y="152">vgl.dataloading</text>
    <text x="330" y="152">vgl.data</text>
    <text x="460" y="152">Dataset · Manifest</text>
    <text x="650" y="152">Sampler</text>
  </g>

  <rect x="40" y="190" width="720" height="60" rx="10" fill="url(#ag-core)"/>
  <text x="60" y="212" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="1">图核心层 GRAPH CORE</text>
  <g font-size="13" font-weight="700" fill="#ffffff">
    <text x="200" y="232">vgl.graph</text>
    <text x="330" y="232">Graph · Batch · Block · HeteroBlock</text>
    <text x="640" y="232">vgl.nn</text>
  </g>

  <rect x="40" y="270" width="720" height="80" rx="10" fill="url(#ag-infra)"/>
  <text x="60" y="292" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="1">基础设施层 INFRASTRUCTURE</text>
  <g font-size="13" font-weight="700" fill="#ffffff">
    <text x="90"  y="320">vgl.ops</text>
    <text x="200" y="320">vgl.sparse</text>
    <text x="320" y="320">vgl.storage</text>
    <text x="460" y="320">vgl.distributed</text>
    <text x="620" y="320">vgl.compat</text>
  </g>
  <g font-size="11" fill="#ffffff" opacity="0.85">
    <text x="90"  y="338">structure</text>
    <text x="200" y="338">SparseTensor</text>
    <text x="320" y="338">FeatureStore</text>
    <text x="460" y="338">Partition · Coord</text>
    <text x="620" y="338">DGL · PyG · NX</text>
  </g>
</svg>
