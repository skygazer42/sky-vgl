<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140">
  <defs>
    <linearGradient id="pGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="pGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="pGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="pShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="pArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="140" rx="12" fill="#fafafa"/>

  <!-- Step 1: Build Graph -->
  <g filter="url(#pShadow)">
    <rect x="20" y="30" width="155" height="80" rx="12" fill="url(#pGrad1)"/>
    <text x="97" y="60" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">1. BUILD GRAPH</text>
    <text x="97" y="78" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Graph.homo()</text>
    <text x="97" y="92" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Graph.hetero()</text>
    <text x="97" y="106" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Graph.temporal()</text>
  </g>

  <!-- Arrow 1-2 -->
  <line x1="180" y1="70" x2="210" y2="70" stroke="#94a3b8" stroke-width="2" marker-end="url(#pArrow)"/>

  <!-- Step 2: Define Task -->
  <g filter="url(#pShadow)">
    <rect x="215" y="30" width="155" height="80" rx="12" fill="url(#pGrad2)"/>
    <text x="292" y="60" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">2. DEFINE TASK</text>
    <text x="292" y="78" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">NodeClassification</text>
    <text x="292" y="92" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">GraphClassification</text>
    <text x="292" y="106" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">LinkPrediction</text>
  </g>

  <!-- Arrow 2-3 -->
  <line x1="375" y1="70" x2="405" y2="70" stroke="#94a3b8" stroke-width="2" marker-end="url(#pArrow)"/>

  <!-- Step 3: Build Model -->
  <g filter="url(#pShadow)">
    <rect x="410" y="30" width="155" height="80" rx="12" fill="url(#pGrad3)"/>
    <text x="487" y="60" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">3. BUILD MODEL</text>
    <text x="487" y="78" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">GCNConv, SAGEConv</text>
    <text x="487" y="92" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">GATConv, GINConv...</text>
    <text x="487" y="106" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">35+ conv layers</text>
  </g>

  <!-- Arrow 3-4 -->
  <line x1="570" y1="70" x2="600" y2="70" stroke="#94a3b8" stroke-width="2" marker-end="url(#pArrow)"/>

  <!-- Step 4: Train -->
  <g filter="url(#pShadow)">
    <rect x="605" y="30" width="175" height="80" rx="12" fill="url(#pGrad4)"/>
    <text x="692" y="60" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">4. TRAIN &amp; EVALUATE</text>
    <text x="692" y="78" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Trainer.fit()</text>
    <text x="692" y="92" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Trainer.evaluate()</text>
    <text x="692" y="106" font-family="'Inter',sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Trainer.test()</text>
  </g>
</svg>
