<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="25%"  stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#0ea5e9"/>
      <stop offset="75%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect x="20" y="40" width="760" height="60" rx="30" fill="url(#pipe)"/>

  <circle cx="90"  cy="70" r="22" fill="#ffffff" fill-opacity="0.22"/>
  <circle cx="240" cy="70" r="22" fill="#ffffff" fill-opacity="0.22"/>
  <circle cx="400" cy="70" r="22" fill="#ffffff" fill-opacity="0.22"/>
  <circle cx="560" cy="70" r="22" fill="#ffffff" fill-opacity="0.22"/>
  <circle cx="710" cy="70" r="22" fill="#ffffff" fill-opacity="0.22"/>

  <g font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">
    <text x="90"  y="74">Load</text>
    <text x="240" y="74">Sample</text>
    <text x="400" y="74">Train</text>
    <text x="560" y="74">Eval</text>
    <text x="710" y="74">Save</text>
  </g>

  <g stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.85" fill="none" stroke-linecap="round">
    <path d="M120 70 L210 70 L200 64 M210 70 L200 76"/>
    <path d="M270 70 L370 70 L360 64 M370 70 L360 76"/>
    <path d="M430 70 L530 70 L520 64 M530 70 L520 76"/>
    <path d="M590 70 L680 70 L670 64 M680 70 L670 76"/>
  </g>

  <g font-size="11" fill="#4b5563" text-anchor="middle">
    <text x="90"  y="26">Dataset · DataLoader</text>
    <text x="240" y="26">Neighbor · SAINT · Cluster</text>
    <text x="400" y="26">Trainer · Task · Callback</text>
    <text x="560" y="26">Metric · Evaluator</text>
    <text x="710" y="26">Checkpoint · Logger</text>
  </g>
  <g font-size="10" fill="#6b7280" text-anchor="middle">
    <text x="90"  y="122">vgl.data / vgl.dataloading</text>
    <text x="240" y="122">vgl.dataloading</text>
    <text x="400" y="122">vgl.engine</text>
    <text x="560" y="122">vgl.metrics</text>
    <text x="710" y="122">vgl.engine</text>
  </g>
</svg>
